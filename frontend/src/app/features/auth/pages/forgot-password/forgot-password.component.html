<div class="auth-shell auth-shell--compact">
  <section class="auth-panel auth-panel--form auth-panel--compact">
    <div class="panel-head">
      <h2>Forgot password</h2>
      <p>Enter your email and we will send a reset link.</p>
    </div>

    <form class="auth-form">
      <label>
        <span>Email</span>
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </label>

      <button type="button" class="primary-btn">Send reset link</button>
    </form>

    <div class="auth-footer">
      Remembered it?
      <a routerLink="/auth/login">Back to sign in</a>
    </div>
  </section>
</div>
