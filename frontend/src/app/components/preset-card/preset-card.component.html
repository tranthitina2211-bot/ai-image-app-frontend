<div
  class="preset-card"
  [ngClass]="[
    sizeClass,
    preset.type === 'video' ? 'is-video' : '',
    previewCount >= 3 ? 'has-many' : '',
    preset.category === 'anime' ? 'is-anime' : '',
    preset.category === 'cinematic' ? 'is-cinematic' : '',
    preset.category === 'product' ? 'is-product' : ''
  ]"
  (click)="onOpen()">

  <div class="media-frame" [class.no-preview]="!hasPreview">
    <ng-container *ngIf="previewItem as item; else noPreview">
      <img
        *ngIf="item.type === 'image'"
        class="media"
        [src]="item.url"
        [alt]="preset.name" />

      <video
        *ngIf="item.type === 'video'"
        class="media"
        [src]="item.url"
        autoplay
        loop
        playsinline
        preload="metadata"
        [muted]="true"
        [attr.muted]="true"
        (loadedmetadata)="forceMute($event)">
      </video>
    </ng-container>

    <ng-template #noPreview>
      <div class="fallback">
        <div class="fallback-icon">✦</div>
        <div class="fallback-text">No preview</div>
      </div>
    </ng-template>

    <div class="top-badges">
      <span class="badge category">{{ categoryLabel }}</span>
      <span class="badge type">{{ preset.type }}</span>
    </div>

    <div class="bottom-overlay">
      <div class="name">{{ preset.name }}</div>
      <div class="sub">
        <span *ngIf="preset.ratio">{{ preset.ratio }}</span>
        <span *ngIf="preset.ratio && previewCount">•</span>
        <span *ngIf="previewCount">{{ previewCount }} preview{{ previewCount > 1 ? 's' : '' }}</span>
        <span *ngIf="hasVideo">• mixed media</span>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="prompt-line">
      {{ preset.prompt }}
    </div>

    <div class="actions">
      <button class="action ghost" type="button" (click)="onCopyPrompt($event)">
        Copy prompt
      </button>
      <button class="action solid" type="button" (click)="onUsePreset($event)">
        Use
      </button>
    </div>
  </div>
</div>
