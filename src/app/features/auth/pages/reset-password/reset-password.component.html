<div class="auth-shell auth-shell--compact">
  <section class="auth-panel auth-panel--form auth-panel--compact">
    <div class="panel-head">
      <h2>Reset password</h2>
      <p>Create a new password for your account.</p>
    </div>

    <form class="auth-form" (ngSubmit)="submit()">
      <label>
        <span>New password</span>
        <input type="password" [(ngModel)]="password" name="password" placeholder="New password" />
      </label>

      <label>
        <span>Confirm password</span>
        <input type="password" [(ngModel)]="confirmPassword" name="confirmPassword" placeholder="Confirm password" />
      </label>

      <button type="submit" class="primary-btn">Update password</button>
    </form>
  </section>
</div>
